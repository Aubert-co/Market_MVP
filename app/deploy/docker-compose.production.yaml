services:
  server:
    build:
      context: .
      dockerfile: dockerfile

    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    env_file:
      - .env
    

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
    tty: true

